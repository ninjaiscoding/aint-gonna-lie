<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ain't Gonna Lie - Game Lobby</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .lobby-container {
            background: var(--panel-bg);
            width: 100%;
            max-width: 800px;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }

        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 2rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 24px;
            font-size: 0.95rem;
        }

        .game-modes {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .mode-btn {
            flex: 1;
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text-muted);
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .mode-btn.active {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
            color: var(--text-main);
        }

        .search-box {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
            margin-bottom: 16px;
            outline: none;
        }

        .search-box:focus {
            border-color: var(--accent);
        }

        .category-scroll-area {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            max-height: 320px;
            overflow-y: auto;
            padding: 16px;
            margin-bottom: 24px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        .category-btn {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.15s;
        }

        .category-btn:hover {
            border-color: var(--text-muted);
            transform: translateY(-1px);
        }

        .category-btn.selected {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .action-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: var(--accent-hover);
        }

        /* Custom Scrollbar */
        .category-scroll-area::-webkit-scrollbar {
            width: 8px;
        }
        .category-scroll-area::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        .category-scroll-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        .category-scroll-area::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="lobby-container">
    <h1>Ain't Gonna Lie</h1>
    <div class="subtitle">Select your mode and category to start the duel</div>

    <!-- Game Mode Selection -->
    <div class="game-modes">
        <button class="mode-btn active" onclick="setMode('standard')">Ain't Gonna Lie (Standard)</button>
        <button class="mode-btn" onclick="setMode('duel')">Ain't My Word (Duel)</button>
    </div>

    <!-- Search / Filter bar -->
    <input type="text" id="searchBar" class="search-box" placeholder="Search categories..." oninput="filterCategories()">

    <!-- Scrollable Grid Container -->
    <div class="category-scroll-area">
        <div id="categoryGrid" class="category-grid">
            <!-- Dynamically populated -->
        </div>
    </div>

    <button class="action-btn" onclick="startGame()">Launch Game</button>
</div>

<script>
    let currentMode = 'standard';
    let selectedCategory = '';

    // Full list of 24 rich categories shared across both modes
    const categories = [
        "Pop Culture", "Movies & TV", "Gaming", "Anime & Manga", 
        "Tech & Coding", "Superheroes", "Internet Memes", "History",
        "Science & Space", "Animals & Nature", "World Geography", "Sports",
        "Music & Artists", "Books & Literature", "Food & Cooking", "Brands & Logos",
        "Mythology", "90s Nostalgia", "Travel & Places", "Vehicles & Cars",
        "Celebrities", "Cartoons", "Board Games", "School Subjects"
    ];

    function displayCategories() {
        const grid = document.getElementById('categoryGrid');
        grid.innerHTML = '';
        
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = `category-btn ${selectedCategory === cat ? 'selected' : ''}`;
            btn.textContent = cat;
            btn.onclick = () => selectCategory(cat);
            grid.appendChild(btn);
        });
    }

    function selectCategory(cat) {
        selectedCategory = cat;
        displayCategories();
    }

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    function filterCategories() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const buttons = document.querySelectorAll('.category-btn');
        
        buttons.forEach(btn => {
            const text = btn.textContent.toLowerCase();
            if(text.includes(query)) {
                btn.style.display = 'block';
            } else {
                btn.style.display = 'none';
            }
        });
    }

    function startGame() {
        if (!selectedCategory) {
            alert('Please select a category first!');
            return;
        }
        
        // Send choice to back-end
        fetch('/api/start-game', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mode: currentMode, category: selectedCategory })
        })
        .then(res => res.json())
        .then(data => {
            alert(`Starting ${currentMode === 'standard' ? "Ain't Gonna Lie" : "Ain't My Word"} under "${selectedCategory}"!`);
        });
    }

    // Initial render
    displayCategories();
</script>

</body>
</html>
